name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tarpaulin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tarpaulin-
            ${{ runner.os }}-cargo-
      - name: Install cargo-tarpaulin
        run: cargo install --locked cargo-tarpaulin
      - name: Run coverage
        run: cargo tarpaulin --workspace --timeout 120 --out Xml --output-dir coverage/
      - name: Enforce minimum coverage threshold
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[^"]+' coverage/cobertura.xml | head -1)
          THRESHOLD=0.70
          echo "Coverage: $COVERAGE (threshold: $THRESHOLD)"
          python3 -c "
          cov = float('$COVERAGE')
          thr = float('$THRESHOLD')
          if cov < thr:
              raise SystemExit(f'Coverage {cov:.2%} is below threshold {thr:.2%}')
          print(f'Coverage {cov:.2%} meets threshold {thr:.2%}')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
            ${{ runner.os }}-cargo-
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Update advisory database
        run: cargo audit fetch
      - name: Run cargo audit
        run: cargo audit --deny warnings

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install --locked stellar-cli --features opt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-
      - run: stellar contract build
      - name: Check WASM binary sizes
        run: |
          WASM_DIR="target/wasm32-unknown-unknown/release"
          GOV_WASM="$WASM_DIR/votechain_governance.wasm"
          TOK_WASM="$WASM_DIR/votechain_token.wasm"
          GOV_LIMIT=$((100 * 1024))   # 100 KB
          TOK_LIMIT=$((50 * 1024))    # 50 KB

          gov_size=$(stat -c%s "$GOV_WASM")
          tok_size=$(stat -c%s "$TOK_WASM")

          echo "governance.wasm : $gov_size bytes (limit: $GOV_LIMIT)"
          echo "token.wasm      : $tok_size bytes (limit: $TOK_LIMIT)"

          # Write size log artifact
          mkdir -p wasm-size-history
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) governance=$gov_size token=$tok_size" \
            >> wasm-size-history/sizes.log

          if [ "$gov_size" -gt "$GOV_LIMIT" ]; then
            echo "ERROR: governance.wasm ($gov_size bytes) exceeds 100 KB limit" >&2
            exit 1
          fi
          if [ "$tok_size" -gt "$TOK_LIMIT" ]; then
            echo "ERROR: token.wasm ($tok_size bytes) exceeds 50 KB limit" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-size-history
          path: wasm-size-history/sizes.log
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm

  wasm-validity:
    name: WASM Validity Tests
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install --locked stellar-cli --features opt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-
      - name: Run WASM validity tests
        run: bash scripts/test_wasm.sh
