name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
            ${{ runner.os }}-cargo-
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Update advisory database
        run: cargo audit fetch
      - name: Run cargo audit
        run: cargo audit --deny warnings

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install --locked stellar-cli --features opt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-
      - run: stellar contract build
      - name: Check WASM binary sizes
        run: |
          WASM_DIR="target/wasm32-unknown-unknown/release"
          GOV_WASM="$WASM_DIR/votechain_governance.wasm"
          TOK_WASM="$WASM_DIR/votechain_token.wasm"
          GOV_LIMIT=$((100 * 1024))   # 100 KB — see docs/wasm-size-thresholds.md
          TOK_LIMIT=$((50 * 1024))    # 50 KB  — see docs/wasm-size-thresholds.md

          gov_size=$(stat -c%s "$GOV_WASM")
          tok_size=$(stat -c%s "$TOK_WASM")

          gov_kb=$(echo "scale=1; $gov_size/1024" | bc)
          tok_kb=$(echo "scale=1; $tok_size/1024" | bc)

          echo "governance.wasm : $gov_size bytes (${gov_kb} KB, limit: 100 KB)"
          echo "token.wasm      : $tok_size bytes (${tok_kb} KB, limit: 50 KB)"

          # Write size log artifact
          mkdir -p wasm-size-history
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) governance=$gov_size token=$tok_size" \
            >> wasm-size-history/sizes.log

          # Post a build summary visible on every CI run
          {
            echo "## WASM Binary Sizes"
            echo ""
            echo "| Contract | Size | Limit | Status |"
            echo "| --- | --- | --- | --- |"
            if [ "$gov_size" -le "$GOV_LIMIT" ]; then
              echo "| \`governance.wasm\` | ${gov_kb} KB | 100 KB | ✅ |"
            else
              echo "| \`governance.wasm\` | ${gov_kb} KB | 100 KB | ❌ EXCEEDS LIMIT |"
            fi
            if [ "$tok_size" -le "$TOK_LIMIT" ]; then
              echo "| \`token.wasm\` | ${tok_kb} KB | 50 KB | ✅ |"
            else
              echo "| \`token.wasm\` | ${tok_kb} KB | 50 KB | ❌ EXCEEDS LIMIT |"
            fi
            echo ""
            echo "> Thresholds defined in [docs/wasm-size-thresholds.md](docs/wasm-size-thresholds.md)"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          if [ "$gov_size" -gt "$GOV_LIMIT" ]; then
            echo "::error file=contracts/governance/src/lib.rs::governance.wasm ($gov_size bytes / ${gov_kb} KB) exceeds the 100 KB limit. See docs/wasm-size-thresholds.md for guidance." >&2
            FAILED=1
          fi
          if [ "$tok_size" -gt "$TOK_LIMIT" ]; then
            echo "::error file=contracts/token/src/lib.rs::token.wasm ($tok_size bytes / ${tok_kb} KB) exceeds the 50 KB limit. See docs/wasm-size-thresholds.md for guidance." >&2
            FAILED=1
          fi
          exit $FAILED
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-size-history
          path: wasm-size-history/sizes.log
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm

  wasm-validity:
    name: WASM Validity Tests
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install --locked stellar-cli --features opt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-
      - name: Run WASM validity tests
        run: bash scripts/test_wasm.sh
