groups:
  - name: votechain-contracts
    interval: 30s
    rules:
      # Health alerts
      - alert: ContractNotHealthy
        expr: contract_deployment_status == 0
        for: 5m
        annotations:
          summary: "Contract {{ $labels.contract_name }} is not healthy"
          description: "Contract {{ $labels.contract_name }} has been unhealthy for 5 minutes"

      - alert: HighErrorRate
        expr: rate(contract_calls_total{status="error"}[5m]) > 0.05
        for: 5m
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(contract_call_duration_seconds_bucket[5m])) > 5
        for: 5m
        annotations:
          summary: "High P99 latency detected"
          description: "P99 latency is {{ $value | humanizeDuration }} (threshold: 5s)"

      # Resource alerts
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        annotations:
          summary: "Prometheus is down"

      - alert: HighCPUUsage
        expr: node_cpu_seconds_total{mode="user"} > 80
        for: 5m
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value | humanize }}%"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        annotations:
          summary: "Low disk space"
          description: "Only {{ $value | humanize }}% disk space remaining"

      - alert: MemoryUsageHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"

  - name: service-health
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend API is down"
          description: "Backend service at {{ $labels.instance }} has been unreachable for 2 minutes"

      - alert: BackendNotReady
        expr: probe_success{job="backend"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Backend /ready check failing"
          description: "Backend readiness probe has been failing for 3 minutes (Redis may be disconnected)"

      - alert: IndexerDown
        expr: up{job="indexer"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Indexer service is down"
          description: "Indexer at {{ $labels.instance }} has been unreachable for 2 minutes"

      - alert: StellarRpcDown
        expr: up{job="stellar-rpc"} == 0 and up{job="stellar-rpc-http"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Stellar RPC is down"
          description: "Both Stellar RPC endpoints have been unreachable for 3 minutes"

      - alert: StellarRpcHighLatency
        expr: histogram_quantile(0.95, rate(soroban_rpc_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Stellar RPC P95 latency is high"
          description: "Stellar RPC P95 latency is {{ $value | humanizeDuration }} (threshold: 3s)"
