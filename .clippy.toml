# Clippy configuration for votechain-contracts
#
# Workspace-level lint rules are in Cargo.toml under [workspace.lints.clippy].
# This file configures numeric thresholds that Cargo.toml cannot express.
#
# All warnings are treated as errors via `-- -D warnings` in CI.

# Functions with cognitive complexity above this trigger a warning.
cognitive-complexity-threshold = 10

# Functions with more args than this trigger `too_many_arguments`.
too-many-arguments-threshold = 9

# Types with more than this many variants trigger `large_enum_variant`.
enum-variant-size-threshold = 200
